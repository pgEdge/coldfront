postgres:
  dsn: "host=localhost port=5432 dbname=mydb user=myuser password=mypass sslmode=disable"

iceberg:
  warehouse: "wh"                                        # Lakekeeper warehouse name
  lakekeeper_endpoint: "http://lakekeeper:8181/catalog"  # Lakekeeper REST catalog

# Cold-store backend: configure EXACTLY ONE of s3 or azure. Any S3-compatible
# store works under s3 — SeaweedFS/MinIO, real AWS S3, OR Google Cloud Storage
# via its S3-interoperability endpoint (see the gcs example below).
s3:
  endpoint: "seaweedfs:8333"    # S3-compatible store endpoint (no http://). OMIT
                                # for real AWS S3 — see the AWS example below.
  region: "us-east-1"           # optional, default: "us-east-1"
  access_key: "admin"
  secret_key: "adminsecret"
  use_ssl: false                # true for a TLS endpoint (GCS, real AWS S3)
  url_style: "path"             # "path" (default; SeaweedFS/MinIO/GCS) or "vhost".
                                # IGNORED when endpoint is empty (real AWS S3 then
                                # uses its native virtual-hosted addressing).

# Real AWS S3 — OMIT endpoint so DuckDB uses AWS's native per-Region
# virtual-hosted + HTTPS endpoint. This is REQUIRED for Regions launched after
# 2019-03-20 (e.g. ap-south-2, eu-south-2): their DNS does not route path-style
# requests and returns HTTP 400. Set region to your bucket's Region. The matching
# persistent (cold-commit) secret must ALSO omit the endpoint:
#   SELECT coldfront.set_storage_secret('<KEY>','<SECRET>', NULL, '<region>');
# and the Lakekeeper warehouse storage-profile must be a real-AWS s3 profile
# (path-style-access: false, no custom endpoint).
# s3:
#   region: "ap-south-2"          # your bucket's Region (no endpoint!)
#   access_key: "<AWS access key id>"
#   secret_key: "<AWS secret access key>"
#   use_ssl: true                 # (ignored without an endpoint; AWS is always https)

# Google Cloud Storage = the s3 backend pointed at the GCS S3-interop endpoint
# with an HMAC key pair (Console → Cloud Storage → Settings → Interoperability).
# No separate gcs backend; Lakekeeper's warehouse must use an s3 profile with
# endpoint https://storage.googleapis.com, flavor s3-compat, path-style. Verified
# end-to-end (iceberg create/insert/read over GCS interop).
# s3:
#   endpoint: "storage.googleapis.com"
#   region: "us-east-1"           # any region; GCS interop accepts the v4 sig
#   access_key: "<GCS HMAC access id>"
#   secret_key: "<GCS HMAC secret>"
#   use_ssl: true

# azure:                        # Azure ADLS Gen2 cold tier (requires the DuckDB
#                               # 1.5.x build — see DUCKDB_1.5_PATCHED.md). The access
#                               # key rides inside the connection string; there
#                               # is no separate account-key field. Leave s3.*
#                               # empty when using azure.
#   connection_string: "DefaultEndpointsProtocol=https;AccountName=<account>;AccountKey=<key>;EndpointSuffix=core.windows.net"

# Vended (minted) credentials: OMIT both s3 and azure entirely. When the cold
# store is vended (SELECT coldfront.set_storage_secret_vended();), Lakekeeper
# mints short-lived per-table credentials at access time, so no credential lives
# in this file, the database, or a DuckDB secret. Keep only the iceberg section
# above. See docs/usage.md#vended-minted-credentials.

archiver:
  # Tiered tables live in coldfront.partition_config (replicated across a mesh);
  # the archiver and partitioner read ONLY that table. Populate it with
  # ./bin/archiver register (one table) or ./bin/archiver import --config <this
  # file> (every table below, each validated exactly as register validates one).
  # This tables: list is the import input and the export output format; it is not
  # read at archive/partition time.
  tables:
    - source_table: "events"        # or "myschema.events"
      partition_period: "monthly"   # "monthly" or "daily"
      hot_period: "3 months"        # tier hot PG → cold Iceberg past this age
      # retention_period: "5 years" # optional: DROP cold Iceberg data past this
      #                             # age (must exceed hot_period). Omit to keep
      #                             # cold data forever.
      # Optional (auto-detected or defaulted):
      # partition_column: "ts"      # auto-detected from pg_catalog
      # future_partitions: 3        # default: 3

    # - source_table: "logs"
    #   partition_period: "daily"
    #   hot_period: "7 days"
