name: Base image (DuckDB 1.5.x)

# Builds + publishes the coldfront-duckdb-base image (libcurl 8.12 + pg_duckdb
# 1.5.4 + patched duckdb-iceberg) to ghcr.io/pgedge for PG 16/17/18. The app image
# (docker/Dockerfile.duckdb15) does `FROM` this; CI and local builds pull it.
#
# Rebuilt only when the base inputs change (Dockerfile / iceberg patch / config)
# or on manual dispatch — NOT on every push. The build is a cold ~30–60 min
# DuckDB/iceberg compile per major; that's fine for an infrequent base rebuild.

# Manual-only: a cold DuckDB + duckdb-iceberg + vcpkg compile on a free GitHub
# runner is long (and risks the job timeout), so base rebuilds are deliberate.
# Trigger from the Actions tab (or `gh workflow run base-image.yml`) when the base
# inputs change (Dockerfile.duckdb15-base / the iceberg patch / config). For an
# initial publish, pushing a locally-built base is faster — see DUCKDB_1.5_PATCHED.md.
#
# The arch/pg inputs scope a single one-off build (e.g. an arm64 smoke test on a
# native ubuntu-24.04-arm runner, free for public repos). Left at defaults it
# builds all three PG majors for amd64. Smoke builds default to NO push.
on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target arch'
        type: choice
        default: amd64
        options: [amd64, arm64]
      pg:
        description: 'PG major (single), or "all" for 16/17/18'
        type: choice
        default: all
        options: [all, '18', '17', '16']
      push:
        description: 'Push to GHCR (off for smoke tests)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write   # GITHUB_TOKEN pushes to ghcr.io/pgedge

jobs:
  # Resolve the dispatch inputs into a runner label and a PG-major matrix so the
  # build job stays a plain matrix. amd64→ubuntu-latest, arm64→ubuntu-24.04-arm
  # (native arm64, free for public repos — no QEMU). pg=all→[18,17,16].
  setup:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.r.outputs.runner }}
      platform: ${{ steps.r.outputs.platform }}
      pgs: ${{ steps.r.outputs.pgs }}
    steps:
      - id: r
        run: |
          set -euo pipefail
          case "${{ inputs.arch }}" in
            amd64) echo "runner=ubuntu-latest"   >> "$GITHUB_OUTPUT"
                   echo "platform=linux/amd64"   >> "$GITHUB_OUTPUT" ;;
            arm64) echo "runner=ubuntu-24.04-arm" >> "$GITHUB_OUTPUT"
                   echo "platform=linux/arm64"   >> "$GITHUB_OUTPUT" ;;
          esac
          if [ "${{ inputs.pg }}" = "all" ]; then
            echo 'pgs=["18","17","16"]' >> "$GITHUB_OUTPUT"
          else
            echo 'pgs=["${{ inputs.pg }}"]' >> "$GITHUB_OUTPUT"
          fi

  base:
    needs: setup
    name: base pg${{ matrix.pg }} (${{ inputs.arch }})
    runs-on: ${{ needs.setup.outputs.runner }}
    timeout-minutes: 300
    env:
      REPO: ghcr.io/pgedge/coldfront-duckdb-base
    strategy:
      fail-fast: false
      matrix:
        pg: ${{ fromJSON(needs.setup.outputs.pgs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0   # full history + tags so git describe sees release tags

      - name: Compute version suffix
        id: ver
        run: |
          set -euo pipefail
          V=$(git describe --tags --exact-match 2>/dev/null || git rev-parse --short=8 HEAD)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version suffix: $V"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build base image (${{ needs.setup.outputs.platform }})
        run: |
          set -euo pipefail
          VTAG=pg${{ matrix.pg }}-${{ inputs.arch }}-${{ steps.ver.outputs.version }}
          docker buildx build \
            --platform ${{ needs.setup.outputs.platform }} \
            --build-arg TARGETARCH=${{ inputs.arch }} \
            --build-arg PG_MAJOR=${{ matrix.pg }} \
            -f docker/Dockerfile.duckdb15-base \
            -t "$REPO:$VTAG" \
            --load .
          echo "Built $REPO:$VTAG"

      # Push ONLY the immutable, version-suffixed tag. The floating pg<maj>-<arch>
      # tag is deliberately never pushed from CI.
      - name: Push base image
        if: ${{ inputs.push }}
        run: |
          set -euo pipefail
          VTAG=pg${{ matrix.pg }}-${{ inputs.arch }}-${{ steps.ver.outputs.version }}
          docker push "$REPO:$VTAG"
          echo "Pushed $REPO:$VTAG"
