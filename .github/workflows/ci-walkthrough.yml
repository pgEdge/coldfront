name: CI - Walkthrough
on:
  push:
    paths: ['examples/walkthrough/**', '.devcontainer/walkthrough/**', 'docs/walkthrough.md', '.github/workflows/ci-walkthrough.yml']
  pull_request:
    paths: ['examples/walkthrough/**', '.devcontainer/walkthrough/**', 'docs/walkthrough.md', '.github/workflows/ci-walkthrough.yml']
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: shellcheck -x --source-path=examples/walkthrough examples/walkthrough/*.sh
      - name: Validate Docker Compose
        run: docker compose -f examples/walkthrough/docker-compose.yml config --quiet
