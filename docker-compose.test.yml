services:
  db:
    build:
      context: .
      dockerfile: docker/coldfront.Dockerfile
    environment:
      POSTGRES_DB: coldfront
      POSTGRES_USER: coldfront
      POSTGRES_PASSWORD: coldfront
    command:
      - "-c"
      - "shared_preload_libraries=pg_duckdb,coldfront"
      - "-c"
      - "coldfront.warehouse=wh"
      - "-c"
      - "coldfront.lakekeeper_endpoint=http://lakekeeper:8181/catalog"
      - "-c"
      - "coldfront.local_pg_dsn=host=/var/run/postgresql dbname=coldfront user=coldfront application_name=coldfront_pglocal options=-cevent_triggers=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldfront"]
      interval: 3s
      timeout: 2s
      retries: 10

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: "server -s3 -dir=/data -s3.config=/etc/seaweedfs/s3.json"
    volumes:
      - ./docker/seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro

  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:latest
    command: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgres://coldfront:coldfront@db:5432/coldfront
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://coldfront:coldfront@db:5432/coldfront
      LAKEKEEPER__PG_ENCRYPTION_KEY: deadbeefdeadbeefdeadbeefdeadbeef

  lakekeeper:
    image: quay.io/lakekeeper/catalog:latest
    command: serve
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgres://coldfront:coldfront@db:5432/coldfront
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://coldfront:coldfront@db:5432/coldfront
      LAKEKEEPER__PG_ENCRYPTION_KEY: deadbeefdeadbeefdeadbeefdeadbeef
      LAKEKEEPER__LISTEN_PORT: 8181
    healthcheck:
      test: ["CMD", "lakekeeper", "healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 10
