site_name: ColdFront

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - meta
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search

validation:
  links:
    anchors: warn

theme:
  name: material
  custom_dir: docs/overrides
  favicon: img/favicon.ico

  logo_dark_mode: 'img/logo-dark.png'
  logo_light_mode: 'img/logo-light.png'

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.prune
    - navigation.top
    - toc.follow

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  generator: false

copyright: Copyright &copy; 2026 pgEdge, Inc
repo_url: https://github.com/pgEdge/ColdFront

nav:
  - Getting Started:
      - Introduction: index.md
      - Installation: installation.md
      - Object Store Setup: object_store.md

  - Architecture:
      - Overview: architecture.md
      - Tiered Mode: architecture_tiered.md
      - Decoupled Mode: architecture_decoupled.md

  - Using ColdFront: usage.md
  - Compaction: compaction.md

  - Developer Resources:
      - Formal Verification: formal/README.md

  - Changelog: changelog.md
  - License: LICENSE.md
