# ColdFront walkthrough — self-contained single-node stack (DuckDB 1.5.x).
# Pulls the published coldfront-duckdb-base, compiles the thin coldfront
# extension on top, and runs Lakekeeper + a local SeaweedFS S3 store.
# Build context is the repo root so the db build sees docker/ and extension/.
name: coldfront-walkthrough
services:
    db:
        platform: linux/amd64  # Pinned: coldfront-duckdb-base is amd64-only (pgEdge/coldfront#27). Remove when the multi-arch base ships (else this forces emulation on arm64).
        build:
            context: ../..
            dockerfile: docker/Dockerfile.duckdb15
            args:
                PG_MAJOR: ${PG_MAJOR:-18}
        environment:
            PG_MAJOR: ${PG_MAJOR:-18}
            MESH: "off"
            COLDFRONT_WAREHOUSE: wh
            COLDFRONT_LAKEKEEPER: http://lakekeeper:8181/catalog
        ports:
            - "${COLDFRONT_PG_PORT:-5432}:5432"
        volumes:
            - pgdata:/var/lib/pgsql/18/data  # Tracks PG_MAJOR=18 (the default). If you override PG_MAJOR, update this path to match $PGDATA.
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U coldfront"]
            interval: 3s
            timeout: 2s
            retries: 20

    seaweedfs:
        image: chrislusf/seaweedfs:latest
        command: "server -s3 -dir=/data -s3.config=/etc/seaweedfs/s3.json"
        volumes:
            - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
            - s3data:/data
        ports:
            - "${COLDFRONT_S3_PORT:-8333}:8333"

    lakekeeper-db:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: lakekeeper
            POSTGRES_PASSWORD: lakekeeper
            POSTGRES_DB: lakekeeper
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U lakekeeper"]
            interval: 3s
            timeout: 2s
            retries: 20

    lakekeeper-migrate:
        image: quay.io/lakekeeper/catalog:latest
        command: migrate
        depends_on:
            lakekeeper-db:
                condition: service_healthy
        environment:
            LAKEKEEPER__PG_DATABASE_URL_READ: postgres://lakekeeper:lakekeeper@lakekeeper-db:5432/lakekeeper
            LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://lakekeeper:lakekeeper@lakekeeper-db:5432/lakekeeper
            LAKEKEEPER__PG_ENCRYPTION_KEY: deadbeefdeadbeefdeadbeefdeadbeef

    lakekeeper:
        image: quay.io/lakekeeper/catalog:latest
        command: serve
        depends_on:
            lakekeeper-migrate:
                condition: service_completed_successfully
        environment:
            LAKEKEEPER__PG_DATABASE_URL_READ: postgres://lakekeeper:lakekeeper@lakekeeper-db:5432/lakekeeper
            LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://lakekeeper:lakekeeper@lakekeeper-db:5432/lakekeeper
            LAKEKEEPER__PG_ENCRYPTION_KEY: deadbeefdeadbeefdeadbeefdeadbeef
            LAKEKEEPER__LISTEN_PORT: 8181
        ports:
            - "${COLDFRONT_LK_PORT:-8181}:8181"
        healthcheck:
            test: ["CMD", "lakekeeper", "healthcheck"]
            interval: 3s
            timeout: 2s
            retries: 10

    archiver:
        profiles: ["tools"]
        build:
            context: ../..
            dockerfile: examples/walkthrough/Dockerfile.archiver
        volumes:
            - ./config:/config:ro
        depends_on:
            db:
                condition: service_healthy

volumes:
    pgdata:
    s3data:
