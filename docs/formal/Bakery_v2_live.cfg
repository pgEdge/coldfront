\* Liveness config for Bakery_v2.tla with the FAITHFUL (non-atomic) Applier and
\* drain.  Checks EventualProgress: every writer eventually reaches a terminal
\* decision.  The non-atomic defer/drain race drops an ack and strands a writer
\* at WaitAcks forever, so EventualProgress is EXPECTED to be VIOLATED here —
\* this is the bench wedge reproduced in the model.  The four safety invariants
\* still HOLD (the race is a liveness failure, not a wrong commit).
\* Stock ordering (the race is async-parquet-independent); no crashes.
\* No SYMMETRY (unsound with liveness checking in TLC).
CONSTANTS
  Writers       = {w1, w2, w3}
  MaxTickets    = 6
  MaxIcebergLen = 5
  MaxCrashes    = 0
  AsyncParquet  = FALSE
  RestampPatch  = TRUE
  SafeAcks      = FALSE

SPECIFICATION Spec

INVARIANTS
  NoLakekeeperConflict
  RollbackNoIceberg
  UniqueTickets
  TicketOrderPreserved

PROPERTIES
  EventualProgress
