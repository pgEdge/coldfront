\* TLC config: LIVENESS with no crashes.
\*
\* MaxCrashes = 0 disables the crasher process, so every writer makes
\* progress through the bakery.  Verifies EventualProgress: every claim
\* eventually leads to "committed" or "rolled_back".  Plus all safety
\* invariants from Bakery.cfg.

CONSTANTS
  Writers       = {w1, w2, w3}
  MaxTickets    = 6
  MaxIcebergLen = 5
  MaxCrashes    = 0

SPECIFICATION Spec

SYMMETRY WriterSymmetry

INVARIANTS
  NoLakekeeperConflict
  RollbackNoIceberg
  UniqueTickets
  TicketOrderPreserved

PROPERTIES
  EventualProgress
