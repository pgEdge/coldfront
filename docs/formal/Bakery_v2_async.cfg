\* TLC config for Bakery_v2.tla — PATCHED async ordering.
\* coldfront.iceberg_async_parquet ON + the bakery-aware-commit-refresh patch
\* (RestampPatch TRUE): the parquet is staged OUTSIDE the claim (writers overlap
\* freely on S3) and parent_snapshot_id is re-stamped at the commit POST, UNDER
\* the claim. This is the ordering the DuckDB 1.5.x (duckdb15) deployment runs.
\* All four safety invariants must still HOLD — the under-claim re-stamp makes the
\* pre-claim staging overlap harmless.
\* 3 writers, no crashes.

CONSTANTS
  Writers       = {w1, w2, w3}
  MaxTickets    = 6
  MaxIcebergLen = 5
  MaxCrashes    = 0
  AsyncParquet  = TRUE
  RestampPatch  = TRUE
  SafeAcks      = TRUE

SPECIFICATION Spec

SYMMETRY WriterSymmetry

INVARIANTS
  NoLakekeeperConflict
  RollbackNoIceberg
  UniqueTickets
  TicketOrderPreserved
