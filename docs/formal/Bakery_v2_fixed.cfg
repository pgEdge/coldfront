\* Liveness config for Bakery_v2.tla with the ATOMIC defer/drain (SafeAcks=TRUE:
\* the apply-time defer decision re-checks R-A's defer rule under SELECT ... FOR
\* UPDATE on the claim row, so no ack is dropped).  Checks EventualProgress:
\* every writer eventually reaches a terminal decision.  This config is EXPECTED
\* to PASS: EventualProgress HOLDS and all four safety invariants hold - the
\* proof that the atomic defer/drain preserves liveness without weakening safety.
\* Stock ordering; no crashes.
\* No SYMMETRY (unsound with liveness checking in TLC).
CONSTANTS
  Writers       = {w1, w2, w3}
  NodeParts     = {{w1}, {w2}, {w3}}
  SameNodeLock  = TRUE
  MaxTickets    = 6
  MaxIcebergLen = 5
  MaxCrashes    = 0
  AsyncParquet  = FALSE
  RestampPatch  = TRUE
  SafeAcks      = TRUE

SPECIFICATION Spec

INVARIANTS
  NoLakekeeperConflict
  RollbackNoIceberg
  UniqueTickets
  TicketOrderPreserved

PROPERTIES
  EventualProgress
