\* Crash variant (1 crash budget). Crash-safety is ordering-independent — a crash
\* affects the claim/ack/release protocol, not the parquet-stage point — so this
\* checks the stock ordering and the result carries to the async ordering.
CONSTANTS
  Writers       = {w1, w2, w3}
  MaxTickets    = 6
  MaxIcebergLen = 5
  MaxCrashes    = 1
  AsyncParquet  = FALSE
  RestampPatch  = TRUE
  SafeAcks      = TRUE

SPECIFICATION Spec

SYMMETRY WriterSymmetry

INVARIANTS
  NoLakekeeperConflict
  RollbackNoIceberg
  UniqueTickets
  TicketOrderPreserved
