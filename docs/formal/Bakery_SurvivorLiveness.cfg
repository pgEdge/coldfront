\* TLC config: surviving-writer liveness under a crash.
\*
\* With the in-bakery reap (the writer at BakeryWait deletes the
\* claims of a peer it deems dead — gated on the implicit-witness
\* condition that the writer itself is past BeginClaim), live writers
\* must always progress even when a peer dies mid-bakery.
\*
\* NonCrashedProgress is the right liveness property: it conditions
\* the implication on Live(w) and allows ~Live(w) as an escape clause.
\* That's correct because a writer that crashes mid-bakery genuinely
\* cannot make a decision (its plpgsql session is gone) — what we
\* require is that surviving writers don't get stuck on its orphan.
\*
\* Expected TLC output: "Model checking completed. No error has been
\* found." — the reap on the next claim's BakeryWait path successfully
\* unblocks the survivors.

CONSTANTS
  Writers       = {w1, w2, w3}
  MaxTickets    = 6
  MaxIcebergLen = 5
  MaxCrashes    = 1

SPECIFICATION Spec

SYMMETRY WriterSymmetry

INVARIANTS
  NoLakekeeperConflict
  RollbackNoIceberg
  UniqueTickets
  TicketOrderPreserved

PROPERTIES
  NonCrashedProgress
