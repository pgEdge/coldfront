\* Add statements after this line.
\* TLC config for Bakery_v2.tla — Ricart-Agrawala-based bakery.
\* STOCK ordering (coldfront.iceberg_async_parquet OFF, the default): the parquet
\* is staged inside the claim, so the parent snapshot is stamped under the claim.
\*
\* 3 writers, no crashes, all four safety invariants.  Includes
\* NoLakekeeperConflict and TicketOrderPreserved — R-A makes both hold
\* even under asymmetric apply.

CONSTANTS
  Writers       = {w1, w2, w3}
  MaxTickets    = 6
  MaxIcebergLen = 5
  MaxCrashes    = 0
  AsyncParquet  = FALSE
  RestampPatch  = TRUE
  SafeAcks      = TRUE

SPECIFICATION Spec

SYMMETRY WriterSymmetry

INVARIANTS
  NoLakekeeperConflict
  RollbackNoIceberg
  UniqueTickets
  TicketOrderPreserved
