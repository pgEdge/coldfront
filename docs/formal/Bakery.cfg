\* Add statements after this line.
\* TLC config: SAFETY with crash budget 1.
\*
\* Verifies that even when one writer crashes mid-bakery, the four
\* safety invariants hold for surviving writers:
\*   - NoLakekeeperConflict   (no concurrent CAS race)
\*   - RollbackNoIceberg      (rollback doesn't leave a snapshot)
\*   - UniqueTickets          (snowflake guarantee)
\*   - TicketOrderPreserved   (commits land in ticket order)
\*
\* Liveness is NOT checked here — see Bakery_NoCrash.cfg for that.
\* A crashed writer's claim leaks (orphan), blocking surviving writers
\* indefinitely.  That known limitation is documented in
\* ARCHITECTURE_DECOUPLED.md and is what the orphan-claim TTL would fix.

CONSTANTS
  Writers       = {w1, w2, w3}
  MaxTickets    = 6
  MaxIcebergLen = 5
  MaxCrashes    = 1

SPECIFICATION Spec

SYMMETRY WriterSymmetry

INVARIANTS
  NoLakekeeperConflict
  RollbackNoIceberg
  UniqueTickets
  TicketOrderPreserved
