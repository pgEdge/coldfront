\* TLC config for Bakery_v2.tla — PRE-PATCH async race (EXPECTED to FAIL).
\* coldfront.iceberg_async_parquet ON but WITHOUT the bakery-aware-commit-refresh
\* patch (RestampPatch FALSE): the parquet is staged outside the claim and the
\* STALE tentative parent is used at the commit POST. A peer that committed while
\* we awaited/held the claim has advanced the iceberg head, so our CAS mismatches
\* → Lakekeeper 409 CatalogCommitConflict (silent loss without app-level retry).
\*
\* TLC is EXPECTED to report `NoLakekeeperConflict` violated, with a counter-
\* example trace. This is the formal demonstration that the bakery-aware patch is
\* MANDATORY for the async ordering — the stock ordering (Bakery_v2.cfg) stamps
\* the parent under the claim and needs no patch. The other three invariants
\* still hold (a 409 just means no append for that writer).
\* 3 writers, no crashes.

CONSTANTS
  Writers       = {w1, w2, w3}
  NodeParts     = {{w1}, {w2}, {w3}}
  SameNodeLock  = TRUE
  MaxTickets    = 6
  MaxIcebergLen = 5
  MaxCrashes    = 0
  AsyncParquet  = TRUE
  RestampPatch  = FALSE
  SafeAcks      = TRUE

SPECIFICATION Spec

SYMMETRY WriterSymmetry

INVARIANTS
  NoLakekeeperConflict
  RollbackNoIceberg
  UniqueTickets
  TicketOrderPreserved
