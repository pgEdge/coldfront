# golangci-lint v2 config for the compactor module (separate go.mod). Mirrors the
# root .golangci.yml's relevant exclusions; ci/matrix.sh runs `make compactor`,
# which lints here, so this is the single source of truth for the compactor's lint.
version: "2"

linters:
  default: standard   # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - gosec
    - misspell
  exclusions:
    rules:
      # gosec on test files: test code is not a runtime security surface.
      - path: _test\.go$
        linters: [gosec]
      # G706 (log injection): main.go logs operator-controlled flag values, not
      # untrusted input.
      - path: main\.go$
        linters: [gosec]
        text: "G706"
      # G304 (file inclusion): config.go reads the operator-supplied --config
      # path by design (same as the archiver's loader).
      - path: config\.go$
        linters: [gosec]
        text: "G304"
